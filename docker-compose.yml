version: "3.9"

services:
  api:
    build: .
    container_name: incident-analyzer-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: incident-analyzer-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
  model_cache:
